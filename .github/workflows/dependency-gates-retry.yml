name: Retry dependency gates (Dependabot)

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  rerun-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Re-run CI on open Dependabot PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          prs=$(gh pr list --author "dependabot[bot]" --state open --json number --jq '.[].number')
          for pr in $prs; do
            echo "Re-running checks for PR #$pr"
            gh pr comment "$pr" --body "Scheduled dependency-gates retry (weekly)." || true
            gh run rerun --repo "${{ github.repository }}" --failed || \
              gh workflow run ci.yml --ref "$(gh pr view "$pr" --json headRefName --jq .headRefName)" || true
          done
