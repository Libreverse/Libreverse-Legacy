name: Post-deploy rollback (manual)

# Triggered manually when smoke fails outside CI, or extend with workflow_run later.

on:
  workflow_dispatch:
    inputs:
      revert_sha:
        description: Merge commit SHA to revert
        required: true

permissions:
  contents: write

jobs:
  revert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Revert and redeploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit "${{ inputs.revert_sha }}"
          git push origin main
          curl -fsS -X GET "https://c.geor.me/api/v1/deploy?uuid=${{ secrets.COOLIFY_DEPLOY_UUID }}&force=false" \
            -H "authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
