version: 2
updates:
    - package-ecosystem: "bundler"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 8
          semver-major-days: 8
          semver-minor-days: 8
          semver-patch-days: 8
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 8
          semver-major-days: 8
          semver-minor-days: 8
          semver-patch-days: 8
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
    - package-ecosystem: "docker"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 8
          semver-major-days: 8
          semver-minor-days: 8
          semver-patch-days: 8
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 8
          semver-major-days: 8
          semver-minor-days: 8
          semver-patch-days: 8
