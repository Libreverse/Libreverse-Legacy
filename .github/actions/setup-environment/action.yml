name: "Setup Environment"
description: "Set up Ruby, Bun, Node.js and install dependencies"

inputs:
    skip-install:
        description: Only set up runtimes (no bundle/bun install)
        required: false
        default: "false"
    use-socket-firewall:
        description: Wrap bundle/bun with sfw (requires SOCKET_API_KEY in env)
        required: false
        default: "false"

runs:
    using: "composite"
    steps:
        - name: Fix File Permissions
          shell: bash
          run: sudo chmod -R u+w .

        - name: Cache Ruby Dependencies
          uses: actions/cache@v3
          with:
              path: vendor/bundle
              key: ${{ runner.os }}-gemfile-${{ hashFiles('**/Gemfile.lock') }}-${{ github.run_id }}-${{ env.MATRIX_JOB || 'single' }}
              restore-keys: |
                  ${{ runner.os }}-gemfile-${{ hashFiles('**/Gemfile.lock') }}-
                  ${{ runner.os }}-gemfile-

        - name: Cache Bun Dependencies
          uses: actions/cache@v3
          with:
              path: ~/.bun
              key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-${{ github.run_id }}-${{ env.MATRIX_JOB || 'single' }}
              restore-keys: |
                  ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-
                  ${{ runner.os }}-bun-

        - name: Setup Ruby
          uses: ruby/setup-ruby@v1
          with:
              bundler-cache: false

        - name: Setup Bun
          uses: oven-sh/setup-bun@v2
          with:
              bun-version-file: .bun-version

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: "24"

        - name: Socket Firewall
          if: inputs.skip-install != 'true' && inputs.use-socket-firewall == 'true'
          uses: ./.github/actions/socket-firewall
          with:
              socket-token: ${{ env.SOCKET_API_KEY || '' }}

        - name: Install dependencies
          if: inputs.skip-install != 'true'
          shell: bash
          run: |
              set -euo pipefail
              bundle config set --local path 'vendor/bundle'
              bundle config set without ""
              if [ "${{ inputs.use-socket-firewall }}" = "true" ]; then
                sfw bundle install --retry 3 --jobs 4
                sfw bun install --frozen-lockfile
              else
                bundle install --retry 3 --jobs 4
                bun install --frozen-lockfile
              fi

        - name: Verify bundle installation
          shell: bash
          run: |
              bundle list
              which bundler || echo "Bundler not in PATH"
              bundle exec ruby -v
