name: "Run Tests"
description: "Run test suites"

inputs:
    test-suite:
        description: "Test suite to run (jest, rails-test)"
        required: true

runs:
    using: "composite"
    steps:
        - name: Run Jest
          if: inputs.test-suite == 'jest'
          shell: bash
          run: NODE_OPTIONS='--experimental-vm-modules' npx jest --coverage=false

        - name: Install native build deps
          if: inputs.test-suite == 'rails-test'
          shell: bash
          run: sudo apt-get update -y && sudo apt-get install -y cmake g++ make

        - name: Bootstrap robotstxt sources
          if: inputs.test-suite == 'rails-test'
          shell: bash
          run: bash scripts/bootstrap-robotstxt-sources.sh

        - name: Run Rails tests
          if: inputs.test-suite == 'rails-test'
          shell: bash
          env:
              DISABLE_SPRING: "1"
          run: |
              set -euo pipefail
              # Artifact-restored SQLite files may exist without Solid Cache indexes.
              rm -f db/cache_test.sqlite3 db/queue_test.sqlite3
              echo "Creating test databases..."
              RAILS_ENV=test DISABLE_EAGER_LOAD=true bundle exec rails db:create
              echo "Setting up test database..."
              RAILS_ENV=test bundle exec rails db:test:prepare
              echo "Running Rails tests..."
              RAILS_ENV=test bundle exec rails test --verbose
