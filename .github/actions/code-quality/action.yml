name: "Code Quality Analysis"
description: "Run code quality analysis tools"

inputs:
    tool:
        description: "Code quality tool to run (fasterer, coffeelint, typos)"
        required: true

runs:
    using: "composite"
    steps:
        - name: Run Fasterer
          if: inputs.tool == 'fasterer'
          shell: bash
          run: |
              echo "Current directory: $(pwd)"
              echo "Bundle config:"
              bundle config list
              echo "Running fasterer on app/, lib/, config/ directories..."
              bundle exec fasterer app/ lib/ config/

        - name: Run Coffeelint
          if: inputs.tool == 'coffeelint'
          shell: bash
          run: |
              echo "Searching for CoffeeScript files under app/javascript..."
              mapfile -t coffee_files < <(find app/javascript -type f -name '*.coffee' | sort)
              if [ "${#coffee_files[@]}" -gt 0 ]; then
                printf '%s\n' "${coffee_files[@]}"
                bun coffeelint -f coffeelint.json "${coffee_files[@]}"
              else
                echo "No .coffee files found, skipping Coffeelint"
              fi

        - name: typos-action
          if: inputs.tool == 'typos'
          uses: crate-ci/typos@v1.33.1
          with:
              config: ./typos.toml
              files: |
                  app
                  config
                  lib
                  scripts
                  spec
                  test/javascript
                  Gemfile
                  Gemfile.lock
                  package.json
                  bun.lock
